<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Valorant Team Stats</title>
    <style>
      :root {
        --bg: #0b1020;
        --panel: #121a30;
        --panel-2: #192341;
        --text: #eef3ff;
        --muted: #98a7d1;
        --accent: #ff4655;
        --good: #65d6a6;
        --bad: #ff7b8a;
        --border: rgba(255, 255, 255, 0.08);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, Arial, sans-serif;
        background: linear-gradient(180deg, #09101d 0%, #0d1428 100%);
        color: var(--text);
      }
      .wrap { max-width: 1240px; margin: 0 auto; padding: 32px 20px 48px; }
      .hero {
        display: flex;
        justify-content: space-between;
        gap: 24px;
        align-items: end;
        margin-bottom: 24px;
      }
      h1 { margin: 0 0 8px; font-size: 40px; }
      p { margin: 0; color: var(--muted); }
      .panel {
        background: rgba(18, 26, 48, 0.9);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 20px;
        box-shadow: 0 10px 35px rgba(0,0,0,0.25);
      }
      textarea, input {
        width: 100%;
        padding: 14px 16px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--panel-2);
        color: var(--text);
        outline: none;
        font: inherit;
      }
      textarea { min-height: 110px; resize: vertical; }
      .controls {
        display: grid;
        grid-template-columns: 2fr 1fr auto auto;
        gap: 12px;
        margin-bottom: 12px;
      }
      button {
        border: 0;
        border-radius: 12px;
        padding: 14px 18px;
        font-weight: 700;
        background: var(--accent);
        color: white;
        cursor: pointer;
      }
      button.secondary {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text);
      }
      .helper { margin-top: 10px; color: var(--muted); font-size: 14px; line-height: 1.45; }
      .summary {
        margin-top: 22px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
      }
      .summary-card, .player-card, .match-card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 18px;
      }
      .summary-title, .stat-label, .section-title, .small {
        color: var(--muted);
        font-size: 13px;
      }
      .summary-value { font-size: 30px; font-weight: 800; }
      .team-grid {
        margin-top: 22px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 16px;
      }
      .player-header {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: start;
        margin-bottom: 14px;
      }
      .player-name { font-size: 20px; font-weight: 700; }
      .rank { padding: 6px 10px; border-radius: 999px; background: rgba(255,255,255,0.06); font-size: 12px; }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }
      .stat-box {
        background: var(--panel-2);
        border-radius: 14px;
        padding: 12px;
      }
      .stat-value { font-size: 22px; font-weight: 800; }
      .agents, .badges { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
      .chip {
        padding: 8px 10px;
        border-radius: 999px;
        background: rgba(255,255,255,0.06);
        color: var(--text);
        font-size: 13px;
      }
      .recent-matches {
        margin-top: 14px;
        display: grid;
        gap: 10px;
      }
      .match-card {
        padding: 12px 14px;
        background: rgba(255,255,255,0.03);
      }
      .match-top {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 8px;
      }
      .win { color: var(--good); }
      .loss { color: var(--bad); }
      .status { margin-top: 16px; min-height: 24px; color: var(--muted); }
      .hidden { display: none; }
      @media (max-width: 900px) {
        .controls { grid-template-columns: 1fr; }
        .hero { flex-direction: column; align-items: start; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="hero">
        <div>
          <h1>Valorant Team Stats</h1>
          <p>Team dashboard powered by your own backend and a third-party VALORANT stats API.</p>
        </div>
      </section>

      <section class="panel">
        <div class="controls">
          <textarea id="playersInput" placeholder="One player per line&#10;Examples:&#10;TenZ#NA1@na&#10;aspas#BR1@na&#10;Derke#EUW@eu">TenZ#NA1@na
zekken#NA1@na
aspas#BR1@na</textarea>
          <input id="matchCountInput" type="number" min="1" max="10" value="5" placeholder="Matches" />
          <button id="loadBtn">Load Team</button>
          <button id="demoBtn" class="secondary">Use Demo</button>
        </div>
        <div class="helper">
          Format: <strong>Name#Tag@region</strong>. Regions supported by HenrikDev include eu, na, ap, kr, latam, and br. This page calls <code>/api/team</code> on your own project, so your API key stays hidden.
        </div>
        <div id="status" class="status"></div>
      </section>

      <section id="summary" class="summary"></section>
      <section id="teamGrid" class="team-grid"></section>
    </div>

    <script>
      const demoData = {
        generatedAt: new Date().toISOString(),
        players: [
          {
            riotId: 'TenZ#NA1', region: 'na', accountLevel: 300,
            kd: 1.29, hs: 30, avgScore: 272, firstKills: 19, firstDeaths: 10,
            kda: '103 / 80 / 25', rank: 'Radiant', rr: 523,
            agents: ['Jett', 'Yoru', 'Reyna'],
            recentMatches: [
              { map: 'Ascent', agent: 'Jett', result: 'W', score: '13-9', kda: '22 / 14 / 4', hs: 32, startedAt: '2026-04-08T19:10:00Z' },
              { map: 'Split', agent: 'Yoru', result: 'L', score: '10-13', kda: '19 / 18 / 6', hs: 27, startedAt: '2026-04-08T18:15:00Z' }
            ]
          },
          {
            riotId: 'zekken#NA1', region: 'na', accountLevel: 280,
            kd: 1.22, hs: 27, avgScore: 251, firstKills: 16, firstDeaths: 12,
            kda: '96 / 79 / 31', rank: 'Radiant', rr: 411,
            agents: ['Raze', 'Jett', 'Neon'],
            recentMatches: [
              { map: 'Lotus', agent: 'Raze', result: 'W', score: '13-7', kda: '24 / 16 / 5', hs: 29, startedAt: '2026-04-08T17:05:00Z' }
            ]
          },
          {
            riotId: 'aspas#BR1', region: 'na', accountLevel: 350,
            kd: 1.35, hs: 34, avgScore: 281, firstKills: 20, firstDeaths: 9,
            kda: '108 / 80 / 21', rank: 'Radiant', rr: 601,
            agents: ['Jett', 'Raze', 'Chamber'],
            recentMatches: [
              { map: 'Bind', agent: 'Jett', result: 'W', score: '13-11', kda: '26 / 17 / 3', hs: 36, startedAt: '2026-04-08T20:30:00Z' }
            ]
          }
        ]
      };

      const summaryEl = document.getElementById('summary');
      const teamGridEl = document.getElementById('teamGrid');
      const statusEl = document.getElementById('status');
      const playersInputEl = document.getElementById('playersInput');
      const matchCountInputEl = document.getElementById('matchCountInput');

      function formatDate(iso) {
        if (!iso) return 'Unknown time';
        const d = new Date(iso);
        return d.toLocaleString();
      }

      function getTeamSummary(players) {
        const safe = players.filter(Boolean);
        if (!safe.length) return null;

        const avgKd = (safe.reduce((n, p) => n + Number(p.kd || 0), 0) / safe.length).toFixed(2);
        const avgHs = Math.round(safe.reduce((n, p) => n + Number(p.hs || 0), 0) / safe.length);
        const avgScore = Math.round(safe.reduce((n, p) => n + Number(p.avgScore || 0), 0) / safe.length);
        const bestHs = [...safe].sort((a, b) => (b.hs || 0) - (a.hs || 0))[0];
        const bestEntry = [...safe].sort((a, b) => (b.firstKills || 0) - (a.firstKills || 0))[0];

        return { avgKd, avgHs, avgScore, bestHs, bestEntry };
      }

      function renderSummary(players) {
        const s = getTeamSummary(players);
        if (!s) {
          summaryEl.innerHTML = '';
          return;
        }
        summaryEl.innerHTML = `
          <div class="summary-card"><div class="summary-title">Team Avg K/D</div><div class="summary-value">${s.avgKd}</div></div>
          <div class="summary-card"><div class="summary-title">Team Avg HS%</div><div class="summary-value">${s.avgHs}%</div></div>
          <div class="summary-card"><div class="summary-title">Team Avg Score</div><div class="summary-value">${s.avgScore}</div></div>
          <div class="summary-card"><div class="summary-title">Best HS%</div><div class="summary-value">${s.bestHs.riotId}</div></div>
          <div class="summary-card"><div class="summary-title">Best Entry</div><div class="summary-value">${s.bestEntry.riotId}</div></div>
        `;
      }

      function renderPlayers(players) {
        teamGridEl.innerHTML = players.map((player) => `
          <article class="player-card">
            <div class="player-header">
              <div>
                <div class="player-name">${player.riotId}</div>
                <div class="small">Region: ${player.region || '-'} · Level: ${player.accountLevel ?? '-'}</div>
              </div>
              <div class="rank">${player.rank || 'Unranked'}${player.rr != null ? ` · ${player.rr} RR` : ''}</div>
            </div>
            <div class="stats-grid">
              <div class="stat-box"><div class="stat-label">K/D</div><div class="stat-value">${player.kd ?? '-'}</div></div>
              <div class="stat-box"><div class="stat-label">HS%</div><div class="stat-value">${player.hs ?? '-'}%</div></div>
              <div class="stat-box"><div class="stat-label">K/D/A</div><div class="stat-value" style="font-size:18px">${player.kda || '-'}</div></div>
              <div class="stat-box"><div class="stat-label">Avg Score</div><div class="stat-value">${player.avgScore ?? '-'}</div></div>
              <div class="stat-box"><div class="stat-label">First Kills</div><div class="stat-value">${player.firstKills ?? 0}</div></div>
              <div class="stat-box"><div class="stat-label">First Deaths</div><div class="stat-value">${player.firstDeaths ?? 0}</div></div>
            </div>
            <div class="agents">${(player.agents || []).map((a) => `<span class="chip">${a}</span>`).join('')}</div>
            <div class="recent-matches">
              ${(player.recentMatches || []).map((m) => `
                <div class="match-card">
                  <div class="match-top">
                    <strong>${m.map || 'Unknown map'}</strong>
                    <strong class="${m.result === 'W' ? 'win' : 'loss'}">${m.result || '-'}</strong>
                  </div>
                  <div class="small">${m.agent || 'Unknown agent'} · ${m.score || '-'} · ${formatDate(m.startedAt)}</div>
                  <div class="small">K/D/A: ${m.kda || '-'} · HS%: ${m.hs ?? '-'}%</div>
                </div>
              `).join('') || '<div class="small">No recent matches found.</div>'}
            </div>
          </article>
        `).join('');
      }

      function parsePlayersInput(raw) {
        return raw.split('\n').map((line) => line.trim()).filter(Boolean);
      }

      async function loadTeam() {
        const players = parsePlayersInput(playersInputEl.value);
        const matches = Number(matchCountInputEl.value || 5);

        if (!players.length) {
          statusEl.textContent = 'Add at least one player.';
          return;
        }

        statusEl.textContent = 'Loading live stats...';
        try {
          const url = `/api/team?players=${encodeURIComponent(players.join(','))}&matches=${encodeURIComponent(matches)}`;
          const res = await fetch(url);
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Request failed');
          renderSummary(data.players || []);
          renderPlayers(data.players || []);
          statusEl.textContent = `Loaded ${data.players.length} player(s). Generated ${new Date(data.generatedAt).toLocaleString()}.`;
        } catch (err) {
          console.error(err);
          statusEl.textContent = `Live API failed: ${err.message}. Showing demo data instead.`;
          renderSummary(demoData.players);
          renderPlayers(demoData.players);
        }
      }

      document.getElementById('loadBtn').addEventListener('click', loadTeam);
      document.getElementById('demoBtn').addEventListener('click', () => {
        renderSummary(demoData.players);
        renderPlayers(demoData.players);
        statusEl.textContent = 'Demo data loaded.';
      });

      renderSummary(demoData.players);
      renderPlayers(demoData.players);
      statusEl.textContent = 'Ready. Add your API key on Vercel, then click Load Team.';
    </script>
  </body>
</html>
