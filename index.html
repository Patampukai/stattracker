<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Valorant Team Act Stats</title>
    <style>
      :root {
        --bg: #0b1020;
        --panel: #121a30;
        --panel-2: #192341;
        --text: #eef3ff;
        --muted: #98a7d1;
        --accent: #ff4655;
        --border: rgba(255,255,255,0.08);
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, Arial, sans-serif;
        background: linear-gradient(180deg, #09101d 0%, #0d1428 100%);
        color: var(--text);
      }

      .wrap {
        max-width: 1280px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      .hero {
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 20px;
        margin-bottom: 24px;
      }

      h1 { margin: 0 0 8px; font-size: 38px; }
      p { margin: 0; color: var(--muted); }

      .panel {
        background: rgba(18,26,48,0.92);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 20px;
        box-shadow: 0 10px 35px rgba(0,0,0,0.25);
      }

      .toolbar {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
      }

      button {
        border: 0;
        border-radius: 12px;
        padding: 13px 18px;
        font-weight: 700;
        background: var(--accent);
        color: white;
        cursor: pointer;
      }

      .meta {
        color: var(--muted);
        font-size: 14px;
      }

      .status {
        margin-top: 14px;
        min-height: 22px;
        color: var(--muted);
      }

      .summary {
        margin-top: 22px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
      }

      .summary-card,
      .player-card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 18px;
      }

      .summary-title,
      .label {
        color: var(--muted);
        font-size: 13px;
        margin-bottom: 8px;
      }

      .summary-value {
        font-size: 28px;
        font-weight: 800;
      }

      .team-grid {
        margin-top: 22px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 16px;
      }

      .player-header {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: start;
        margin-bottom: 14px;
      }

      .player-name {
        font-size: 22px;
        font-weight: 800;
      }

      .small-tag {
        font-size: 12px;
        color: var(--muted);
        background: rgba(255,255,255,0.05);
        padding: 6px 8px;
        border-radius: 999px;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }

      .stat-box {
        background: var(--panel-2);
        border-radius: 14px;
        padding: 12px;
      }

      .stat-value {
        font-size: 22px;
        font-weight: 800;
      }

      .stat-sub {
        font-size: 12px;
        color: var(--muted);
        margin-top: 4px;
      }

      .agents {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 14px;
      }

      .chip {
        padding: 8px 10px;
        border-radius: 999px;
        background: rgba(255,255,255,0.06);
        font-size: 13px;
      }

      .error-box {
        margin-top: 14px;
        padding: 12px;
        border-radius: 12px;
        background: rgba(255, 70, 85, 0.12);
        border: 1px solid rgba(255, 70, 85, 0.25);
        color: #ffd5d9;
        font-size: 13px;
      }

      @media (max-width: 700px) {
        .hero { flex-direction: column; align-items: start; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="hero">
        <div>
          <h1>Valorant Team Act Stats</h1>
          <p>Saved player cards with live current-act stats only. No demo cards, no user input.</p>
        </div>
      </section>

      <section class="panel">
        <div class="toolbar">
          <button id="loadBtn">Refresh Team Stats</button>
          <span class="meta">Edit <code>TEAM_PLAYERS</code> once in the code. Region is auto-detected by the backend.</span>
        </div>
        <div id="status" class="status"></div>
      </section>

      <section id="summary" class="summary"></section>
      <section id="teamGrid" class="team-grid"></section>
    </div>

    <script>
      const TEAM_PLAYERS = [
        { displayName: 'TenZ', name: 'TenZ', tag: 'NA1' },
        { displayName: 'zekken', name: 'zekken', tag: 'NA1' },
        { displayName: 'aspas', name: 'aspas', tag: 'BR1' }
      ];

      const API_BASE = 'https://YOUR-VERCEL-PROJECT.vercel.app';

      const teamGrid = document.getElementById('teamGrid');
      const summary = document.getElementById('summary');
      const statusEl = document.getElementById('status');

      function valueOrDash(value, suffix = '') {
        if (value === null || value === undefined || value === '') return '-';
        return `${value}${suffix}`;
      }

      function renderPlayers(players) {
        teamGrid.innerHTML = players.map(player => `
          <article class="player-card">
            <div class="player-header">
              <div>
                <div class="player-name">${player.displayName || player.riotId}</div>
                <div class="label">${player.seasonLabel || 'Current Act'} • ${player.riotId}</div>
              </div>
              <div class="small-tag">Live</div>
            </div>

            <div class="stats-grid">
              <div class="stat-box">
                <div class="label">Matches</div>
                <div class="stat-value">${valueOrDash(player.matchesPlayed)}</div>
              </div>
              <div class="stat-box">
                <div class="label">K / D / A</div>
                <div class="stat-value" style="font-size:18px">${valueOrDash(player.kda)}</div>
                <div class="stat-sub">Current act totals</div>
              </div>
              <div class="stat-box">
                <div class="label">K/D</div>
                <div class="stat-value">${valueOrDash(player.kd)}</div>
              </div>
              <div class="stat-box">
                <div class="label">HS%</div>
                <div class="stat-value">${valueOrDash(player.hs, '%')}</div>
              </div>
              <div class="stat-box">
                <div class="label">ADR</div>
                <div class="stat-value">${valueOrDash(player.adr)}</div>
              </div>
              <div class="stat-box">
                <div class="label">First Kills</div>
                <div class="stat-value">${valueOrDash(player.firstKills)}</div>
              </div>
              <div class="stat-box">
                <div class="label">First Deaths</div>
                <div class="stat-value">${valueOrDash(player.firstDeaths)}</div>
              </div>
              <div class="stat-box">
                <div class="label">Multikills</div>
                <div class="stat-value">${valueOrDash(player.multikills)}</div>
                <div class="stat-sub">2K+ rounds combined</div>
              </div>
            </div>

            <div class="agents">
              ${(player.agents || []).length
                ? player.agents.map(agent => `<span class="chip">${agent}</span>`).join('')
                : '<span class="chip">No agent data</span>'}
            </div>

            ${player.error ? `<div class="error-box">${player.error}</div>` : ''}
          </article>
        `).join('');
      }

      function renderSummary(players) {
        if (!players.length) {
          summary.innerHTML = '';
          return;
        }

        const validPlayers = players.filter(p => !p.error);
        if (!validPlayers.length) {
          summary.innerHTML = '';
          return;
        }

        const avgKd = (validPlayers.reduce((sum, p) => sum + Number(p.kd || 0), 0) / validPlayers.length).toFixed(2);
        const avgHs = Math.round(validPlayers.reduce((sum, p) => sum + Number(p.hs || 0), 0) / validPlayers.length);
        const avgAdr = Math.round(validPlayers.reduce((sum, p) => sum + Number(p.adr || 0), 0) / validPlayers.length);
        const totalMatches = validPlayers.reduce((sum, p) => sum + Number(p.matchesPlayed || 0), 0);

        summary.innerHTML = `
          <div class="summary-card">
            <div class="summary-title">Team Average K/D</div>
            <div class="summary-value">${avgKd}</div>
          </div>
          <div class="summary-card">
            <div class="summary-title">Team Average HS%</div>
            <div class="summary-value">${avgHs}%</div>
          </div>
          <div class="summary-card">
            <div class="summary-title">Team Average ADR</div>
            <div class="summary-value">${avgAdr}</div>
          </div>
          <div class="summary-card">
            <div class="summary-title">Matches Counted</div>
            <div class="summary-value">${totalMatches}</div>
          </div>
        `;
      }

      async function fetchTeamStats() {
        const query = TEAM_PLAYERS
          .map(p => `${p.name}#${p.tag}`)
          .join(',');

        const res = await fetch(`${API_BASE}/api/team?players=${encodeURIComponent(query)}`);
        if (!res.ok) {
          throw new Error(`API request failed: ${res.status}`);
        }

        const data = await res.json();

        return data.map((item, index) => ({
          ...item,
          displayName: TEAM_PLAYERS[index]?.displayName || item.riotId,
          seasonLabel: item.seasonLabel || 'Current Act'
        }));
      }

      async function loadLiveStats() {
        statusEl.textContent = 'Loading live current-act stats...';
        try {
          const players = await fetchTeamStats();
          renderPlayers(players);
          renderSummary(players);
          statusEl.textContent = 'Loaded live stats for your saved players.';
        } catch (error) {
          console.error(error);
          teamGrid.innerHTML = '';
          summary.innerHTML = '';
          statusEl.textContent = 'Could not load live stats. Check API_BASE, Vercel, or your backend logs.';
        }
      }

      document.getElementById('loadBtn').addEventListener('click', loadLiveStats);
      loadLiveStats();
    </script>
  </body>
</html>
