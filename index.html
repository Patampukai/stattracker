<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patampuku Stats</title>

<style>
body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: #0b1020;
  color: #fff;
}

.wrap {
  max-width: 1200px;
  margin: auto;
  padding: 30px;
}

h1 {
  margin-bottom: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
}

.card {
  background: #121a30;
  border-radius: 16px;
  padding: 20px;
}

.name {
  font-size: 20px;
  font-weight: 700;
}

.sub {
  font-size: 13px;
  color: #9aa4c7;
  margin-bottom: 10px;
}

.rank {
  margin-bottom: 10px;
  color: #ff4655;
  font-weight: 600;
}

.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.stat {
  background: #192341;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

.value {
  font-weight: 700;
}

.label {
  font-size: 12px;
  color: #9aa4c7;
}
</style>
</head>

<body>
<div class="wrap">
  <h1>Patampuku Stats</h1>
  <div id="grid" class="grid"></div>
</div>

<script>
const PLAYERS = [
  "OglukasM#RAWRR",
  "VoicelessV#daun",
  "Knightly#Blawg"
];

const API = "https://stattracker.vercel.app/api/team";

async function load() {
  const grid = document.getElementById("grid");

  const res = await fetch(API + "?players=" + encodeURIComponent(PLAYERS.join(",")));
  const data = await res.json();

  grid.innerHTML = data.map(p => {
    if (p.error) {
      return `<div class="card">${p.error}</div>`;
    }

    const [k, d, a] = p.kda.split("/").map(x => Number(x.trim()));
    const kd = d > 0 ? (k / d).toFixed(2) : k.toFixed(2);

    return `
      <div class="card">
        <div class="name">${p.riotId}</div>
        <div class="sub">${p.seasonLabel}</div>
        <div class="rank">${p.rank || "Unranked"} • ${p.rr || 0} RR</div>

        <div class="stats">
          <div class="stat">
            <div class="value">${k}/${d}/${a}</div>
            <div class="label">KDA</div>
          </div>

          <div class="stat">
            <div class="value">${kd}</div>
            <div class="label">K/D</div>
          </div>

          <div class="stat">
            <div class="value">${p.hs || 0}%</div>
            <div class="label">HS%</div>
          </div>
        </div>
      </div>
    `;
  }).join("");
}

load();
</script>
</body>
</html>
