<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patampuku Stats</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b1020;
  color: white;
}

.wrap {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

h1 {
  margin-bottom: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
}

.card {
  background: #121a30;
  padding: 15px;
  border-radius: 10px;
}

.name {
  font-size: 18px;
  font-weight: bold;
}

.sub {
  font-size: 12px;
  color: #aaa;
  margin-bottom: 10px;
}

.rank {
  color: #ff4655;
  margin-bottom: 10px;
}

.stats {
  display: flex;
  justify-content: space-between;
}

.stat {
  text-align: center;
}

.value {
  font-weight: bold;
}

.label {
  font-size: 11px;
  color: #aaa;
}

.error {
  color: red;
}
</style>
</head>

<body>
<div class="wrap">
  <h1>Patampuku Stats</h1>
  <div id="grid" class="grid"></div>
</div>

<script>
const PLAYERS = [
  "OglukasM#RAWRR",
  "VoicelessV#daun",
  "Knightly#Blawg"
];

const API = "https://stattracker.vercel.app/api/team";

async function loadStats() {
  const grid = document.getElementById("grid");

  try {
    const res = await fetch(API + "?players=" + encodeURIComponent(PLAYERS.join(",")));
    const data = await res.json();

    grid.innerHTML = data.map(p => {

      if (p.error) {
        return `<div class="card error">${p.riotId}<br>${p.error}</div>`;
      }

      const [k, d, a] = (p.kda || "0/0/0").split("/").map(x => Number(x.trim()));
      const kd = d > 0 ? (k / d).toFixed(2) : k.toFixed(2);

      return `
        <div class="card">
          <div class="name">${p.riotId}</div>
          <div class="sub">${p.seasonLabel || "Tracker"}</div>

          <div class="rank">
            ${p.rank || "Unranked"} • ${p.rr || 0} RR
          </div>

          <div class="stats">
            <div class="stat">
              <div class="value">${k}/${d}/${a}</div>
              <div class="label">KDA</div>
            </div>

            <div class="stat">
              <div class="value">${kd}</div>
              <div class="label">K/D</div>
            </div>

            <div class="stat">
              <div class="value">${p.hs || 0}%</div>
              <div class="label">HS%</div>
            </div>
          </div>
        </div>
      `;
    }).join("");

  } catch (err) {
    grid.innerHTML = "Failed to load stats";
    console.error(err);
  }
}

loadStats();
</script>
</body>
</html>
